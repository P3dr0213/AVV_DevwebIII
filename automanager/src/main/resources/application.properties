spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Jackson - Aceitar null values em desserializao
spring.jackson.serialization.write-null-map-values=false
spring.jackson.default-property-inclusion=non_null
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.deserialization.accept-empty-array-as-null-object=true
server.port=8080
spring.application.name=autobots-test

